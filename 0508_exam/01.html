<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MBTI 여행 추천</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Pretendard', sans-serif;
    }

    body{
      background: linear-gradient(135deg, #dbeafe, #fce7f3);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .container{
      width:900px;
      background:white;
      border-radius:25px;
      padding:40px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#333;
      font-size:40px;
    }

    .mbti-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:15px;
      margin-bottom:30px;
    }

    button{
      padding:15px;
      border:none;
      border-radius:15px;
      background:#6366f1;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#4338ca;
      transform:translateY(-3px);
    }

    .result{
      background:#f8fafc;
      border-radius:20px;
      padding:30px;
      display:none;
    }

    .result h2{
      color:#4f46e5;
      margin-bottom:15px;
    }

    .result p{
      margin:10px 0;
      font-size:18px;
      color:#444;
      line-height:1.6;
    }

    .emoji{
      font-size:50px;
      margin-bottom:15px;
    }

    @media(max-width:768px){
      .mbti-grid{
        grid-template-columns:repeat(2, 1fr);
      }

      .container{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>✈ MBTI 여행 추천 사이트</h1>

    <div class="mbti-grid">
      <button onclick="showMBTI('INFP')">INFP</button>
      <button onclick="showMBTI('ENFP')">ENFP</button>
      <button onclick="showMBTI('INTJ')">INTJ</button>
      <button onclick="showMBTI('ESTP')">ESTP</button>

      <button onclick="showMBTI('ISTJ')">ISTJ</button>
      <button onclick="showMBTI('ENTJ')">ENTJ</button>
      <button onclick="showMBTI('ISFP')">ISFP</button>
      <button onclick="showMBTI('ESFP')">ESFP</button>

      <button onclick="showMBTI('INFJ')">INFJ</button>
      <button onclick="showMBTI('ENTP')">ENTP</button>
      <button onclick="showMBTI('ISTP')">ISTP</button>
      <button onclick="showMBTI('ESFJ')">ESFJ</button>

      <button onclick="showMBTI('ISFJ')">ISFJ</button>
      <button onclick="showMBTI('ENFJ')">ENFJ</button>
      <button onclick="showMBTI('INTP')">INTP</button>
      <button onclick="showMBTI('ESTJ')">ESTJ</button>
    </div>

    <div class="result" id="resultBox">
      <div class="emoji" id="emoji"></div>
      <h2 id="title"></h2>
      <p id="travel"></p>
      <p id="activity"></p>
      <p id="design"></p>
    </div>

  </div>

  <script>

        design:"분위기 : 파스텔 감성"
      },

        design:"분위기 : 밝고 통통 튀는 느낌"

      },

      INTP:{
        emoji:"💡",
        title:"호기심 여행",
        travel:"추천 여행지 : 베를린, 도쿄",
        activity:"추천 활동 : 과학관, 전시",
        design:"분위기 : 차분한 테크 느낌"
      },

      ESTJ:{
        emoji:"🏢",
        title:"효율 여행",
        travel:"추천 여행지 : 싱가포르, 서울",
        activity:"추천 활동 : 계획 코스",
        design:"분위기 : 정리된 비즈니스 스타일"
      }

    };

    function showMBTI(type){

      document.getElementById("resultBox").style.display = "block";

      document.getElementById("emoji").innerText = mbtiData[type].emoji;
      document.getElementById("title").innerText = type + " - " + mbtiData[type].title;
      document.getElementById("travel").innerText = mbtiData[type].travel;
      document.getElementById("activity").innerText = mbtiData[type].activity;
      document.getElementById("design").innerText = mbtiData[type].design;

    }

  </script>

</body>
</html>
