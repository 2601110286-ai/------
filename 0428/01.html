<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .font_big{
            font-size: 2em;
        }
        .font_style1{
            font-style: italic;
            font-weight: bold;
            text-align: center;
        }
        .button{
            width: 150px;
            height: 70px;
            background-color: #2db400;
            border-width: 10px;
            border-style: solid;
            border-color: #ffffff;
            border-radius: 30px;
            box-shadow: 5px 5px 5px #a9a9a9;
        }
        .button>a{
            display: block;
            color: #ffffff;
            text-decoration: none;
            line-height: 70px;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="button">
        <a class="font_big font_style1">Naver</a>
    </div>
</body>
</html>
