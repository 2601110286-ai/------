<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="01.html" method="get"> <!-- get 으로 하면 선택한것이 링크창에 보이고 post는 안보임-->
        <fieldset>
            <legend>회원가입</legend>
            <table width="400">
                <tr>
                    <td><label for="name">성명 : </label></td>
                    <td><input type="text" id="name" name="name"></td>
                </tr>
                <tr>
                    <td><label for="email">이메일 : </label></td>
                    <td><input type="email" id="email" name="email"></td>
                </tr>
                <tr>
                    <td><label for="addr">주소 : </label></td>
                    <td><input type="text" id="addr" name="addr"></td>
                </tr>
                <tr>
                    <td>성별 : </td>
                    <td><input type="radio" name="gender" value="남성">남성 &nbsp;&nbsp;
                    <input type="radio" name="gender" value="여성">여성</td>
                </tr>
                <tr>
                    <td>취미 : </td>
                    <td><input type="checkbox" name="hobby" value="운동">운동 &nbsp;&nbsp;
                    <input type="checkbox" name="hobby" value="독서">독서 &nbsp;&nbsp;
                    <input type="checkbox" name="hobby" value="영화감상">영화감상</td>
                </tr>
                <tr>
                    <td>
                    <input type="submit" name="가입하기">&nbsp;&nbsp;
                    <input type="reset" name="입력초기화"></td>
                </tr>
                 <tr>
                    <td>남기고 싶은 말</td>
                    <td> 
                        <textarea name="message" cols="30" rows="5">기타 하고 싶은 말이 있으면 여기에 입력해주세요.</textarea>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
